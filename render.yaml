# Render Blueprint — FREE, no credit card.
# Deploys ONLY the web service on Render's free tier and connects to a free
# external Postgres (Neon or Supabase) that does NOT expire. This avoids both
# (a) Render's 30-day free-Postgres expiry and (b) any card prompt tied to
# provisioning a Render database.
#
# Steps:
#   1. Create a free Postgres at https://neon.tech (no card). Copy its
#      connection string (postgresql://user:pass@host/db?sslmode=require).
#   2. Push this repo to GitHub.
#   3. Render -> New -> Blueprint -> pick this repo -> Apply.
#   4. When prompted (DATABASE_URL is sync:false), paste the Neon URL.
#   5. Set CORS_ORIGIN to your SPA origin, e.g. https://<user>.github.io
#   6. Health: GET https://<service>.onrender.com/api/health
services:
  - type: web
    name: nlc-ecc-api
    runtime: node
    rootDir: server
    plan: free                 # 750 hrs/mo; sleeps after 15 min idle (cold start ~30-60s)
    region: singapore          # closest to PK; change if you prefer
    buildCommand: npm install && npm run build
    preDeployCommand: node scripts/migrate.js   # idempotent: loads schema once + seeds demo admin
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL       # paste your Neon/Supabase connection string when prompted
        sync: false
      - key: NODE_VERSION
        value: "20"
      - key: SEED_DEV_USER      # seed a demo admin so X-User auth works; remove for real prod
        value: "1"
      - key: DEV_USER_NAME
        value: demo
      - key: CORS_ORIGIN        # set to your SPA origin, e.g. https://<user>.github.io
        sync: false

# OPTIONAL: use Render's own free Postgres instead of Neon (no card, but it
# EXPIRES after ~30 days and is then deleted). If you prefer that, replace the
# DATABASE_URL/sync:false entry above with:
#   - key: DATABASE_URL
#     fromDatabase: { name: nlc-ecc-db, property: connectionString }
# and uncomment:
# databases:
#   - name: nlc-ecc-db
#     plan: free
#     region: singapore        # MUST match the web service region
#     databaseName: fnpc
#     postgresMajorVersion: "16"
