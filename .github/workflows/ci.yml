name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --workspace @nlc-ecc/web run typecheck
      - run: npm --workspace @nlc-ecc/web run test
      # Build both deploy modes to catch mode-specific breakage.
      - run: npm --workspace @nlc-ecc/web run build
        env:
          VITE_DATA_MODE: local
      - run: npm --workspace @nlc-ecc/web run build
        env:
          VITE_DATA_MODE: api
          VITE_API_BASE_URL: https://api.placeholder.invalid

  server:
    name: Server (typecheck + schema load + integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nlc_ecc
          POSTGRES_USER: nlc_app
          POSTGRES_PASSWORD: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nlc_app -d nlc_ecc"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Load schema
        run: PGPASSWORD=ci psql -h localhost -U nlc_app -d nlc_ecc -f db/schema.sql
      - name: Build server
        working-directory: server
        run: npm install && npx tsc -p tsconfig.json --noEmit
      # Add: run server integration tests against the postgres service here.

  # Parity guard during the transition: rebuild the legacy single-file app
  # chain and run its 44 smoke suites so behavior can't silently drift.
  parity:
    name: Prototype parity (rebuild + 44 smoke suites)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Rebuild prototype from baseline
        working-directory: prototype
        run: bash build_all.sh
      - name: Run smoke suites
        working-directory: prototype
        run: bash run_tests.sh
