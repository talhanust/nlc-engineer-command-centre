name: Deploy demo to GitHub Pages

# Publishes the STATIC, single-user demo only (VITE_DATA_MODE=local).
# The real multi-user app + backend + data deploy to on-prem infrastructure.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static demo
        run: npm --workspace @nlc-ecc/web run build
        env:
          VITE_DATA_MODE: api
          VITE_API_BASE_URL: https://nlc-engineer-command-centre-web-ivory.vercel.app
          VITE_API_USER: demo
          VITE_BASE: /nlc-engineer-command-centre/
      - name: SPA fallback for deep links
        # BrowserRouter deep links (e.g. /node/pd-north) 404 on refresh without
        # this; Pages serves 404.html for unknown paths, the SPA then routes.
        run: cp apps/web/dist/index.html apps/web/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
